<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resources - Wolves of Denali</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --slate: #1E2A38;
    --slate-mid: #2B3D52;
    --spruce: #1C3A2A;
    --night: #141C26;
    --glacier: #6A9AB5;
    --glacier-muted: #4E7A94;
    --lichen: #7A9A6E;
    --stone: #8896A4;
    --alpenglow: #D4728C;
    --alpenglow-soft: #E8A0B2;
    --tundra-gold: #D4A04A;
    --tundra-red: #B85C3F;
    --summit: #F0EDE6;
    --snowfield: #E4E8EC;
    --cloud: #D5DAE0;
    --dawn: #F7F0EA;
    --shadow: rgba(20,28,38,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--summit);
    color: var(--slate);
    line-height: 1.6;
  }

  ::selection { background: var(--alpenglow); color: white; }

  /* ── Site nav ── */
  .site-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(20, 28, 38, 0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(106, 154, 181, 0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 6vw;
    height: 3.25rem;
  }

  .nav-brand {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--summit);
    text-decoration: none;
  }

  .nav-brand:hover { color: var(--glacier); transition: color 0.2s; }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    list-style: none;
  }

  .nav-links a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone);
    text-decoration: none;
    padding: 0.35em 0.75em;
    border-radius: 3px;
    transition: color 0.2s, background 0.2s;
  }

  .nav-links a:hover {
    color: var(--summit);
    background: rgba(106, 154, 181, 0.1);
  }

  .nav-links a.active {
    color: var(--glacier);
    background: rgba(106, 154, 181, 0.12);
  }

  /* ── Header ── */
  header {
    background: linear-gradient(175deg, var(--night) 0%, var(--slate) 60%, var(--slate-mid) 100%);
    padding: 3.5rem 6vw 3rem;
  }

  header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: var(--summit);
    line-height: 1.05;
    margin-bottom: 0.75rem;
  }

  header p {
    font-size: 1.05rem;
    font-weight: 300;
    color: var(--cloud);
    max-width: 560px;
  }

  /* ── Main layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 3rem 6vw 5rem;
  }

  /* ── Category section ── */
  .category-section {
    margin-bottom: 3.5rem;
  }

  .category-heading {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--cloud);
  }

  .category-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: var(--slate);
    color: var(--glacier);
    padding: 0.25em 0.65em;
    border-radius: 3px;
  }

  .category-count {
    font-size: 0.85rem;
    color: var(--stone);
    font-weight: 400;
  }

  /* ── Card grid ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  /* ── Card ── */
  .card {
    background: white;
    border: 1px solid var(--cloud);
    border-radius: 6px;
    padding: 1.25rem 1.4rem 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .card:hover {
    box-shadow: 0 4px 16px var(--shadow);
    border-color: var(--glacier-muted);
  }

  .card-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--slate);
  }

  .card-title a {
    color: var(--slate);
    text-decoration: none;
    border-bottom: 1px solid var(--glacier-muted);
    transition: color 0.2s, border-color 0.2s;
  }

  .card-title a:hover {
    color: var(--glacier);
    border-color: var(--glacier);
  }

  .card-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--stone);
    display: flex;
    flex-wrap: wrap;
    gap: 0.3em 0.75em;
  }

  .card-authors { color: var(--slate-mid); }
  .card-year    { color: var(--tundra-gold); }

  .card-description {
    font-size: 0.9rem;
    color: #4a5564;
    line-height: 1.6;
    margin-top: 0.15rem;
    flex: 1;
  }

  /* ── Region divider ── */
  .region-group + .region-group {
    margin-top: 1rem;
    padding-top: 3rem;
    border-top: 2px solid var(--cloud);
  }

  .region-heading {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .region-heading h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 900;
    color: var(--slate);
    line-height: 1.1;
  }

  .region-heading .region-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--stone);
  }

  /* ── Footer ── */
  footer {
    background: var(--night);
    color: var(--stone);
    text-align: center;
    padding: 2rem 6vw;
    font-size: 0.85rem;
  }

  footer a {
    color: var(--glacier);
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-brand" href="index.html">Wolves of Denali</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="resources.html" class="active">Resources</a></li>
  </ul>
</nav>

<header>
  <h1>Resources</h1>
  <p>Reports, datasets, research, books, and community sources on Denali and Alaska wolves.</p>
</header>

<main id="resource-container">
  <!-- Populated by script below -->
</main>

<footer>
  <p>Data: <a href="https://irma.nps.gov/DataStore/Reference/Profile/2307739" target="_blank" rel="noopener">NPS IRMA DataStore</a>. Public domain, U.S. Government Works.</p>
</footer>

<script>
const CATEGORY_LABELS = {
  nps_report:       'NPS Reports',
  dataset:          'Datasets',
  research_paper:   'Research Papers',
  book:             'Books',
  documentary:      'Documentaries',
  online_community: 'Online Communities',
  web_resource:     'Web Resources',
};

// Preferred display order
const CATEGORY_ORDER = [
  'nps_report',
  'research_paper',
  'dataset',
  'book',
  'documentary',
  'online_community',
  'web_resource',
];

fetch('resources.json')
  .then(r => r.json())
  .then(data => render(data))
  .catch(err => {
    document.getElementById('resource-container').innerHTML =
      `<p style="color:var(--tundra-red)">Failed to load resources: ${err.message}</p>`;
  });

function isYukonCharley(entry) {
  return entry.region === 'yukon_charley';
}

function sortByYear(entries) {
  return [...entries].sort((a, b) => {
    if (a.year === b.year) return 0;
    if (a.year === null) return 1;
    if (b.year === null) return -1;
    return b.year - a.year;
  });
}

function groupByCategory(entries) {
  const groups = {};
  for (const entry of entries) {
    (groups[entry.category] ??= []).push(entry);
  }
  return groups;
}

function renderGroup(entries, heading, subLabel) {
  const groups = groupByCategory(entries);
  const categories = [
    ...CATEGORY_ORDER.filter(c => groups[c]),
    ...Object.keys(groups).filter(c => !CATEGORY_ORDER.includes(c)),
  ];

  const sectionsHTML = categories.map(cat => {
    const sorted = sortByYear(groups[cat]);
    const label = CATEGORY_LABELS[cat] ?? cat.replace(/_/g, ' ');
    return `
      <section class="category-section">
        <div class="category-heading">
          <span class="category-label">${label}</span>
          <span class="category-count">${sorted.length} ${sorted.length === 1 ? 'entry' : 'entries'}</span>
        </div>
        <div class="card-grid">
          ${sorted.map(cardHTML).join('')}
        </div>
      </section>`;
  }).join('');

  return `
    <div class="region-group">
      <div class="region-heading">
        <h2>${heading}</h2>
        <span class="region-sub">${subLabel}</span>
      </div>
      ${sectionsHTML}
    </div>`;
}

function render(data) {
  const ycEntries = data.filter(isYukonCharley);
  const mainEntries = data.filter(e => !isYukonCharley(e));

  const container = document.getElementById('resource-container');
  container.innerHTML =
    renderGroup(mainEntries, 'Denali', 'Denali National Park &amp; Preserve') +
    (ycEntries.length ? renderGroup(ycEntries, 'Yukon - Charley', 'Yukon - Charley Rivers National Preserve') : '');
}

function cardHTML(e) {
  const title = e.url
    ? `<a href="${e.url}" target="_blank" rel="noopener noreferrer">${esc(e.title)}</a>`
    : esc(e.title);

  const authors = e.authors?.length
    ? `<span class="card-authors">${e.authors.map(esc).join(', ')}</span>`
    : '';

  const year = e.year
    ? `<span class="card-year">${e.year}</span>`
    : '';

  const meta = (authors || year)
    ? `<div class="card-meta">${authors}${year}</div>`
    : '';

  const desc = e.description
    ? `<p class="card-description">${esc(e.description)}</p>`
    : '';

  return `
    <article class="card">
      <div class="card-title">${title}</div>
      ${meta}
      ${desc}
    </article>`;
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
